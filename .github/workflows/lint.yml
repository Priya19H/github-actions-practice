#Goal
name: Check Python syntax is correct or not using python linter

#When Workflow should triggered 
on:
  push:
    paths: "*.py"

jobs:
  Linter-Job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
        
      - name: Check Python Linter
        run: pip install ruff
        
      - name: Linter Check
        run: ruff check --fix
